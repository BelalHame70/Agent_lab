<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - AgentLab</title>
  <link rel="stylesheet" href="/admin/admin.css" />
</head>

<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">A</div>

      <div class="login-left-content">
        <h2>Welcome back.</h2>
        <p>Your AI agents are waiting. Sign in to manage, monitor, and deploy.</p>

        <div class="login-stats">
          <div>
            <strong>5 min</strong>
            <span>To first agent</span>
          </div>

          <div>
            <strong>50+</strong>
            <span>Languages</span>
          </div>

          <div>
            <strong>24/7</strong>
            <span>Uptime</span>
          </div>
        </div>
      </div>

      <div class="login-form-side">
        <h1>Welcome<br />Home</h1>
        <p>Sign in to your account to continue</p>

        <div class="error-box" id="loginError"></div>

        <form id="adminLoginForm">
          <label>Email</label>
          <input id="emailInput" type="email" placeholder="Email address" required />

          <label>Password</label>
          <input id="passwordInput" type="password" placeholder="Password" required />

          <button type="submit">Sign In</button>
        </form>

        <span class="login-note">
          Only admin accounts can access this dashboard.
        </span>
      </div>
    </div>
  </div>

  <script src="/admin/admin-login.js"></script>
</body>
</html>
